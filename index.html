<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>😊upup助手图片</title>

<style>

body{
background:#071d49;
color:white;
font-family:sans-serif;
padding:20px;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:#102c67;
border-radius:15px;
overflow:hidden;
padding:15px;
}

img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.copy{
background:#1e90ff;
color:white;
}

.download{
background:#22c55e;
color:white;
}

</style>
</head>

<body>

<h1> 😊upup助手图片</h1>

<div id="gallery" class="grid"></div>
  <script>
    async function loadData() {
        const gallery = document.getElementById('gallery');
        try {
            const response = await fetch('data.json');
            const data = await response.json();

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <img src="${item.image}">
                    <button class="copy" onclick="copyImage(this, '${item.image}')">复制图片</button>
                `;
                gallery.appendChild(card);
            });
        } catch (e) {
            console.error("加载失败:", e);
        }
    }

    async function copyImage(btn, url) {
        btn.innerText = "正在复制...";
        
        try {
            // 获取图片数据
            const response = await fetch(url);
            const blob = await response.blob();

            // 尝试写入剪贴板
            // 注意：这里我们去掉了所有 fallback（备用）方案，失败了就是失败了
            await navigator.clipboard.write([
                new ClipboardItem({ [blob.type]: blob })
            ]);
            
            btn.innerText = "已复制 ✅";
        } catch (e) {
            console.error(e);
            btn.innerText = "复制失败 ❌";
            // 这里我们不再触发任何下载行为，只会显示失败状态
        }

        setTimeout(() => { btn.innerText = "复制图片"; }, 2000);
    }

    loadData();
</script>
</body>
</html>
