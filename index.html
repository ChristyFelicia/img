<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>😊upup助手图片</title>

<style>

body{
background:#071d49;
color:white;
font-family:sans-serif;
padding:20px;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:#102c67;
border-radius:15px;
overflow:hidden;
padding:15px;
}

img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.copy{
background:#1e90ff;
color:white;
}

.download{
background:#22c55e;
color:white;
}

</style>
</head>

<body>

<h1> 😊upup助手图片</h1>

<div id="gallery" class="grid"></div>
  
<script>

fetch('data.json')
.then(r => r.json())
.then(data => {

  const gallery = document.getElementById("gallery");

  data.forEach(item => {

    gallery.innerHTML += `
      <div class="card">
        <img src="${item.image}" crossorigin="anonymous">
        <h3>${item.title || ''}</h3>

        <button class="copy"
          onclick="copyImage(this, '${item.image}')">
          复制图片
        </button>

        <button class="download"
          onclick="downloadImage('${item.image}')">
          下载图片
        </button>

      </div>
    `;
  });

});

async function copyImage(btn, url) {

  try {
    btn.innerText = "复制中...";

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = url;

    await img.decode();

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    ctx.drawImage(img, 0, 0);

    canvas.toBlob(async (blob) => {

      try {
        await navigator.clipboard.write([
          new ClipboardItem({ "image/jpg": blob })
        ]);

        btn.innerText = "已复制 ✅";

        setTimeout(() => {
          btn.innerText = "复制图片";
        }, 1500);

      } catch (e) {
        console.log(e);
        alert("当前浏览器不支持直接复制图片，将改为下载");
        downloadImage(url);
      }

    }, "image/jpg");

  } catch (e) {
    console.log(e);
    alert("复制失败，可能是跨域问题");
  }
}

function downloadImage(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "image.jpg";
  a.click();
}

</script>
</body>
</html>
