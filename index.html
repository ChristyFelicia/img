<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>😊upup助手图片</title>

<style>

body{
background:#071d49;
color:white;
font-family:sans-serif;
padding:20px;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:#102c67;
border-radius:15px;
overflow:hidden;
padding:15px;
}

img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.copy{
background:#1e90ff;
color:white;
}

.download{
background:#22c55e;
color:white;
}

</style>
</head>

<body>

<h1> 😊upup助手图片</h1>

<div id="gallery" class="grid"></div>
  
<script>
    async function loadData() {
        const gallery = document.getElementById('gallery');
        try {
            // 从同目录读取 data.json
            const response = await fetch('data.json');
            const data = await response.json();

            // 循环遍历数据并生成 HTML
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <img src="${item.image}" crossorigin="anonymous">
                    <button class="copy" onclick="copyImage(this, '${item.image}')">复制图片</button>
                `;
                gallery.appendChild(card);
            });
        } catch (e) {
            console.error("数据加载失败:", e);
            gallery.innerHTML = "<p>无法加载数据，请检查 data.json 路径是否正确。</p>";
        }
    }

    async function copyImage(btn, url) {
        btn.innerText = "复制中...";
        try {
            // 因为图片和网页在同一个 GitHub Pages 项目下，属于同源
            // 这次应该可以直接通过 fetch 获取并复制，不会触发跨域问题
            const response = await fetch(url);
            const blob = await response.blob();
            await navigator.clipboard.write([
                new ClipboardItem({ [blob.type]: blob })
            ]);
            btn.innerText = "已复制 ✅";
        } catch (e) {
            btn.innerText = "复制失败 ❌";
            alert("复制失败，可能是浏览器权限限制");
        }
        setTimeout(() => { btn.innerText = "复制图片"; }, 2000);
    }

    // 页面加载完成后执行
    loadData();
</script>
  
</body>
</html>
